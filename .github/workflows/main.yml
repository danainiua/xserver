name: 🪄 XServer自动签到

on:
  repository_dispatch:
    types: [XServer]          # Webhook 触发关键词：XServer
  workflow_dispatch:        # 保留手动点击触发按钮

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: 设置代理隧道 (Hysteria 2)
        env:
          HY2_JSON: ${{ secrets.PROXY_SERVER }}
        run: |
          # 1. 下载 hysteria 官方最新核心
          wget -q -O hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          
          # 2. 将原配置存入临时文件
          echo "$HY2_JSON" > temp_config.json
          
          # 3. 动态注入模式 (mode) 和本地 socks5 监听端口 (inbounds)
          # 完美解决新版内核严格校验导致的 FATAL no mode specified 报错
          jq '.mode = "client" | .inbounds = [{"type": "socks5", "listen": "127.0.0.1:1080"}]' temp_config.json > hy2_config.json
          
          # 4. 根据缝合好的完整配置在后台启动
          ./hysteria -c hy2_config.json > hy2.log 2>&1 &
          
          # 5. 等待 4 秒确保建立连接
          sleep 4
          
          # 6. 打印输出日志，方便在面板上排查 hy2 连接状态
          echo "=== Hysteria 2 启动日志 ==="
          cat hy2.log
          echo "=========================="

      - name: 🎲 定时任务基础上随机延迟（0-119秒）
        run: |
          delay=$((RANDOM % 120))
          echo "Random delay: ${delay}s"
          sleep $delay

      - name: 运行脚本
        env:
          XSERVER_EMAIL: ${{ secrets.XSERVER_EMAIL }}
          XSERVER_PASSWORD: ${{ secrets.XSERVER_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_SERVER: socks5://127.0.0.1:1080
        run: python renew.py

      # ⏱️ 提交 time.txt 到仓库(用于解决60天无文件变化的限制)
      - name: Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%
